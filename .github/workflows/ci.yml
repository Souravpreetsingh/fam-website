name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Static Site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          test -f public/index.html || { echo "Missing: public/index.html"; exit 1; }
          for page in rooms booking explore gallery amenities life login signup; do
            test -f "public/pages/$page.html" || { echo "Missing: public/pages/$page.html"; exit 1; }
          done
          echo "All HTML pages present"

      - name: Check for empty files
        run: |
          find public -type f -size 0 -name "*.html" -o -name "*.css" -o -name "*.js" | while read f; do
            echo "WARNING: Empty file: $f"
          done
